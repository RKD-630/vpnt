<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>PDF Reader &amp; Page Number Printer</title>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- pdf-lib -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<link rel="stylesheet" href="style.css" /></head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <div class="brand">📄 PDF Page Printer</div>
  <button class="btn primary" id="btnImport">
    <span>📂</span><span class="label">Import PDF</span>
  </button>
  <button class="btn" id="btnNew" disabled="" title="Open New PDF">
    <span>🆕</span><span class="label">New</span>
  </button>
  <div style="position: relative;" id="mGlassWrap">
    <button class="btn" id="btnMGlass" disabled="" title="Magnifier Glass">
      <span class="label">M-Glass</span>
    </button>
    <div class="m-glass-dropdown" id="mGlassDropdown">
      <button data-mode="1">M-Glass: Rect</button>
      <button data-mode="2">M-Glass: Circle</button>
      <button data-mode="0">Off</button>
    </div>
  </div>
  <div class="spacer"></div>
  <button class="btn" id="btnFooter" disabled="" title="Page Number Settings">
    <span>🔢</span><span class="label">Page Numbers</span>
  </button>
  <button class="btn" id="btnPreview" disabled="" title="Print Preview">
    <span>👁️</span><span class="label">Preview</span>
  </button>
  <button class="btn primary" id="btnPrint" disabled="" title="Print PDF">
    <span>🖨️</span><span class="label">Print PDF</span>
  </button>
  <button class="btn icon" id="btnTheme" title="Toggle Theme">🌙</button>
</div>

<!-- Main -->
<div class="main">
  <div class="viewer-wrap">
    <div class="file-info" id="fileInfo" style="display:none;">
      <span>File: <b id="infoName">—</b></span>
      <span>Size: <b id="infoSize">—</b></span>
      <span>Pages: <b id="infoPages">—</b></span>
    </div>
    <div class="viewer" id="viewer">
      <div class="dropzone" id="dropzone">
        <div class="icon">📄</div>
        <h3>Drop PDF here or click to upload</h3>
        <p>Supports multi-page PDFs • Works on mobile &amp; desktop</p>
      </div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="card" id="card-quick">
      <h4>Quick Settings</h4>
      <div class="card-body">
        <label class="switch">
          <input type="checkbox" id="quickEnable" checked="" />
          Enable Page Numbers
        </label>
        <div class="field">
          <label>PDF Background</label>
          <select id="quickBg">
            <option value="white" selected="">White</option>
            <option value="black">Black</option>
            <option value="dim">Dim</option>
            <option value="yellow">Yellow</option>
          </select>
        </div>
        <div class="field">
          <label>Position</label>
          <select id="quickPos">
            <option value="left">Left</option>
            <option value="center" selected="">Center</option>
            <option value="right">Right</option>
            <option value="left-vertical">Left Vert</option>
            <option value="right-vertical">Right Vert</option>
          </select>
        </div>
        <div class="field">
          <label>Style</label>
          <select id="quickStyle">
            <option value="1">1</option>
            <option value="01">01</option>
            <option value="Page 1" selected="">Page 1</option>
            <option value="Page 1 of 25">Page 1 of 25</option>
            <option value="1 / 25">1 / 25</option>
            <option value="custom">Custom…</option>
          </select>
        </div>
        <div class="field" id="customFmtWrap" style="display:none;">
          <label>Custom Format (use {n}, {total})</label>
          <input type="text" id="customFmt" value="Page {n} of {total}" />
        </div>
      </div>
    </div>

    <div class="card" id="card-font">
      <h4>Font</h4>
      <div class="card-body">
        <div class="field">
          <label>Font Family</label>
          <select id="fontFamily">
            <option value="Helvetica">Helvetica</option>
            <option value="TimesRoman">Times Roman</option>
            <option value="Courier">Courier</option>
          </select>
        </div>
        <div class="row">
          <div class="field">
            <label>Size (pt)</label>
            <input type="number" id="fontSize" value="11" min="6" max="48" />
          </div>
          <div class="field">
            <label>Color</label>
            <input type="color" id="fontColor" value="#000000" />
          </div>
        </div>
        <div class="row">
          <label class="switch"><input type="checkbox" id="fontBold" /> Bold</label>
          <label class="switch"><input type="checkbox" id="fontItalic" /> Italic</label>
        </div>
        <div class="field">
          <label>Margin from bottom (pt): <span id="marginVal">30</span></label>
          <input type="range" id="marginBottom" min="10" max="100" value="30" />
        </div>
      </div>
    </div>

    <div class="card" id="card-adjustment">
      <h4>Adjustment</h4>
      <div class="card-body">
        <div class="field" style="display: flex; gap: 4px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap;">
           <button class="btn icon" id="btnZoomOut" disabled="" title="Zoom Out">🔍−</button>
           <button class="btn icon" id="btnZoomIn" disabled="" title="Zoom In">🔍+</button>
           <button class="btn icon" id="btnFitWidth" disabled="" title="Fit Width">⇔</button>
           <button class="btn icon" id="btnFitPage" disabled="" title="Fit Page">⤢</button>
           <button class="btn icon" id="btnRotLeft" disabled="" title="Rotate Left">↺</button>
           <button class="btn icon" id="btnRotRight" disabled="" title="Rotate Right">↻</button>
        </div>
        <div class="field">
          <div class="seg" id="adjType" style="flex-wrap: wrap;">
            <button data-val="brightness" class="active" style="flex:1 1 45%;">Brightness</button>
            <button data-val="contrast" style="flex:1 1 45%;">Contrast</button>
            <button data-val="darkness" style="flex:1 1 45%;">Darkness</button>
            <button data-val="hue" style="flex:1 1 45%;">Hue</button>
          </div>
        </div>
        <div class="field" style="margin-top:15px;">
          <input type="range" id="adjSlider" min="0" max="200" value="100" style="width:100%;" />
        </div>
      </div>
    </div>

    <div class="card" id="card-option">
      <h4>Option</h4>
      <div class="card-body">
        <div style="position: relative; width: 100%;">
          <button class="btn" id="btnMGlassMobile" disabled="" style="width:100%; justify-content:center;">
            <span class="label">M-Glass Options</span>
          </button>
          <div class="m-glass-dropdown" id="mGlassDropdownMobile" style="width:100%; text-align:center;">
            <button data-mode="1" style="width:100%; text-align:center;">M-Glass: Rect</button>
            <button data-mode="2" style="width:100%; text-align:center;">M-Glass: Circle</button>
            <button data-mode="0" style="width:100%; text-align:center;">Off</button>
          </div>
        </div>
        <button class="btn" id="btnPreviewMobile" disabled="" style="width:100%; justify-content:center;">👁️ Preview</button>
        <button class="btn primary" id="btnPrintBig" disabled="" style="width:100%; justify-content:center;">🖨️ Large Print PDF</button>
        <button class="btn" id="btnDownload" disabled="" style="width:100%; justify-content:center;">💾 Download Modified PDF</button>
      </div>
    </div>
  </aside>
</div>

<!-- Mobile Bottom Nav -->
<nav class="mobile-bottom-nav">
  <button class="nav-btn" onclick="openSidebarTab('quick')">📱<br /><small>Display</small></button>
  <button class="nav-btn" onclick="openSidebarTab('option')">⚙️<br /><small>Option</small></button>
  <button class="nav-btn" onclick="openSidebarTab('adjustment')">🛠️<br /><small>Setting</small></button>
</nav>

<!-- Print Preview Modal -->
<div class="modal-backdrop" id="previewModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Print Preview</h3>
      <button class="btn icon" id="closePreview">✕</button>
    </div>
    <div class="modal-body">
      <div class="row" style="margin-bottom:14px;">
        <div class="field">
          <label>Orientation</label>
          <select id="orient">
            <option value="portrait">Portrait</option>
            <option value="landscape">Landscape</option>
          </select>
        </div>
        <div class="field">
          <label>Paper Size</label>
          <select id="paperSize">
            <option value="a4">A4</option>
            <option value="a3">A3</option>
            <option value="letter">Letter</option>
            <option value="legal">Legal</option>
            <option value="custom">Custom</option>
          </select>
        </div>
      </div>
      <div class="row" style="margin-bottom:14px;">
        <div class="field">
          <label>Margins</label>
          <select id="margins">
            <option value="0">None</option>
            <option value="10">Small</option>
            <option value="20" selected="">Medium</option>
            <option value="40">Large</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="field">
          <label>Scaling</label>
          <select id="scaling">
            <option value="actual">Actual Size</option>
            <option value="fit" selected="">Fit to Page</option>
            <option value="fill">Fill Page</option>
          </select>
        </div>
      </div>
      <div class="print-preview-area" id="previewArea"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="closePreview2">Close</button>
      <button class="btn primary" id="doPrint">🖨️ Print</button>
    </div>
  </div>
</div>

<!-- Print Options Modal -->
<div class="modal-backdrop" id="printModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Print Options</h3>
      <button class="btn icon" id="closePrint">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Pages</label>
        <div class="seg" id="pageRange">
          <button data-val="all" class="active">All</button>
          <button data-val="current">Current</button>
          <button data-val="range">Range</button>
          <button data-val="odd">Odd</button>
          <button data-val="even">Even</button>
        </div>
      </div>
      <div class="field" id="rangeWrap" style="display:none;">
        <label>Page Range (e.g. 1-5, 8, 10-12)</label>
        <input type="text" id="rangeInput" placeholder="1-10" />
      </div>
      <div class="row">
        <div class="field">
          <label>Copies</label>
          <input type="number" id="copies" value="1" min="1" max="99" />
        </div>
        <div class="field">
          <label>Current Page</label>
          <input type="number" id="currentPage" value="1" min="1" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="closePrint2">Cancel</button>
      <button class="btn primary" id="confirmPrint">Print</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="application/pdf" style="display:none" />

<div class="toast" id="toast"></div>
<div class="loading" id="loading"><div class="spinner"></div></div>

<div class="magnifier-wrapper rect" id="magnifierRect">
  <div class="magnifier-inner">
    <canvas id="magnifierCanvas"></canvas>
  </div>
  <div class="magnifier-handle"></div>
</div>

<div class="mag-controller" id="magController">
  <button class="mag-btn mag-up" data-dir="up">↑</button>
  <button class="mag-btn mag-left" data-dir="left">←</button>
  <button class="mag-btn mag-center" data-dir="center">○</button>
  <button class="mag-btn mag-right" data-dir="right">→</button>
  <button class="mag-btn mag-down" data-dir="down">↓</button>
</div>



<script src="script.js"></script></body></html>
