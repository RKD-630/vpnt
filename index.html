<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BookRack - PDF Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet" />
    
<link rel="stylesheet" href="style.css" /></head>
<body class="antialiased">

    <!-- Library View -->
    <div id="libraryView" class="min-h-screen p-4 md:p-8 library-bg">
        <div class="max-w-7xl mx-auto mb-8">
            <div class="glass-panel rounded-2xl p-6 shadow-2xl">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-gradient-to-br from-purple-500 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-purple-600 to-indigo-600 bg-clip-text text-transparent">BookRack</h1>
                            <p class="text-sm text-gray-500 dark:text-gray-400">Your Personal PDF Library</p>
                        </div>
                    </div>
                    
                    <div class="flex gap-3 flex-wrap justify-center">
                        <button onclick="toggleDarkMode()" class="p-3 rounded-xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                            </svg>
                        </button>
                        <button onclick="document.getElementById('fileInput').click()" class="import-btn px-6 py-3 rounded-xl text-white font-semibold flex items-center gap-2 shadow-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                            </svg>
                            Import PDF
                        </button>
                        <button onclick="document.getElementById('folderInput').click()" class="import-btn px-6 py-3 rounded-xl text-white font-semibold flex items-center gap-2 shadow-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                            </svg>
                            Import Folder
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <input type="file" id="fileInput" accept=".pdf" multiple="" class="hidden" onchange="handleFiles(this.files)" />
        <input type="file" id="folderInput" webkitdirectory="" directory="" multiple="" class="hidden" onchange="handleFiles(this.files)" />

        <div id="booksGrid" class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>

        <div id="emptyState" class="max-w-7xl mx-auto text-center py-20">
            <div class="glass-panel rounded-3xl p-12 inline-block">
                <div class="w-24 h-24 bg-gradient-to-br from-purple-400 to-indigo-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl">
                    <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold mb-2">Your Library is Empty</h2>
                <p class="text-gray-500 mb-6">Import PDF files to start reading</p>
                <button onclick="document.getElementById('fileInput').click()" class="import-btn px-8 py-3 rounded-xl text-white font-semibold shadow-lg">
                    Add Your First Book
                </button>
            </div>
        </div>
    </div>

    <!-- Reader View -->
    <div id="readerView" class="hidden fixed inset-0 bg-gray-900 z-50 overflow-hidden">
        <!-- Top Bar -->
        <div class="absolute top-0 left-0 right-0 z-20 p-4 flex justify-between items-center bg-gradient-to-b from-black/50 to-transparent">
            <button onclick="closeReader()" class="p-3 rounded-full bg-white/20 backdrop-blur-md hover:bg-white/30 transition-all text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
            <div class="text-white text-center flex-1 mx-4 min-w-0">
                <h3 id="readerTitle" class="font-semibold truncate mx-auto"></h3>
                <p id="pageIndicator" class="text-sm opacity-80">Pages 1-2 of 10</p>
            </div>
            <div id="headerToolbar" class="flex items-center gap-2 overflow-x-auto hide-scrollbar cursor-grab active:cursor-grabbing max-w-[55vw] md:max-w-none py-1" onmousedown="startToolbarDrag(event)" onmouseleave="stopToolbarDrag()" onmouseup="stopToolbarDrag()" onmousemove="toolbarDragMove(event)">
                <!-- View Mode Toggle -->
                <button onclick="toggleViewMode()" id="viewModeBtn" class="mode-btn active-mode p-3 rounded-full bg-white/20 backdrop-blur-md transition-all text-white" title="Toggle Two-Page View">
                    <svg id="viewModeIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
                    </svg>
                </button>
                
                <!-- Tool Group: Zoom, Magnifier, Background -->
                <div class="flex items-center bg-white/20 backdrop-blur-md rounded-full overflow-hidden">
                    <!-- Prev Page -->
                    <button onclick="previousPage()" class="p-3 hover:bg-white/30 transition-all text-white border-r border-white/10" title="Previous Page">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <!-- Next Page -->
                    <button onclick="nextPage()" class="p-3 hover:bg-white/30 transition-all text-white border-r border-white/10" title="Next Page">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </button>
                    <!-- Zoom In -->
                    <button onclick="zoomIn()" class="p-3 hover:bg-white/30 transition-all text-white border-r border-white/10" title="Zoom In">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/>
                        </svg>
                    </button>
                    <!-- Zoom Out -->
                    <button onclick="zoomOut()" class="p-3 hover:bg-white/30 transition-all text-white border-r border-white/10" title="Zoom Out">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"/>
                        </svg>
                    </button>
                    <!-- Magnifier Mode Toggle -->
                    <button onclick="toggleMagnifierMode()" id="magnifierModeBtn" class="mode-btn p-3 hover:bg-white/30 transition-all text-white border-r border-white/10" title="Toggle Magnifier Lens">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                            <circle cx="10" cy="10" r="2" fill="currentColor"/>
                        </svg>
                    </button>
                    <!-- Background Mode Toggle -->
                    <button onclick="togglePdfBackground()" id="pdfBgBtn" class="mode-btn p-3 hover:bg-white/30 transition-all text-white" title="Toggle Background Color (White/Black/Dim)">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Scroll Controls (Right Center) -->
        <div id="scrollControls" class="scroll-controls absolute right-4 top-1/2 -translate-y-1/2 z-20 flex flex-col gap-3">
            <button onclick="scrollUp()" class="scroll-btn w-12 h-12 rounded-full bg-white/90 hover:bg-white text-gray-800 flex items-center justify-center shadow-2xl backdrop-blur-md relative overflow-hidden">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
                </svg>
            </button>
            <button onclick="scrollDown()" class="scroll-btn w-12 h-12 rounded-full bg-white/90 hover:bg-white text-gray-800 flex items-center justify-center shadow-2xl backdrop-blur-md relative overflow-hidden">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
            </button>
        </div>

        <!-- PDF Container -->
        <div class="absolute inset-0 flex p-4 md:p-12 overflow-auto" id="pdfContainer">
            <div class="pages-container m-auto" id="pagesContainer">
                <!-- Left Page -->
                <div class="page-wrapper" id="pageWrapperLeft">
                    <canvas id="pdfCanvasLeft" class="pdf-canvas"></canvas>
                </div>
                <!-- Book Binding (visible only in two-page mode) -->
                <div class="book-binding hidden" id="bookBinding"></div>
                <!-- Right Page -->
                <div class="page-wrapper" id="pageWrapperRight">
                    <canvas id="pdfCanvasRight" class="pdf-canvas"></canvas>
                </div>
            </div>
        </div>

        <!-- Magnifier Glass Element -->
        <div id="magnifierGlass" class="magnifier-glass">
            <canvas id="magnifierCanvas"></canvas>
            <div id="magnifierHandle" class="magnifier-handle" title="Double click to detach/attach. Drag to move when detached."></div>
        </div>

        <!-- Magnifier Controller (D-pad) -->
        <div id="magController" class="mag-controller">
            <button class="mag-btn mag-up" onmousedown="startMagMove(0, -6)" onmouseup="stopMagMove()" onmouseleave="stopMagMove()" ontouchstart="startMagMove(0, -6)" ontouchend="stopMagMove()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
            </button>
            <button class="mag-btn mag-left" onmousedown="startMagMove(-6, 0)" onmouseup="stopMagMove()" onmouseleave="stopMagMove()" ontouchstart="startMagMove(-6, 0)" ontouchend="stopMagMove()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <div class="mag-center"></div>
            <button class="mag-btn mag-right" onmousedown="startMagMove(6, 0)" onmouseup="stopMagMove()" onmouseleave="stopMagMove()" ontouchstart="startMagMove(6, 0)" ontouchend="stopMagMove()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </button>
            <button class="mag-btn mag-down" onmousedown="startMagMove(0, 6)" onmouseup="stopMagMove()" onmouseleave="stopMagMove()" ontouchstart="startMagMove(0, 6)" ontouchend="stopMagMove()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </button>
        </div>

        <!-- Touch Zones -->
        <div class="touch-zone touch-zone-left" onclick="previousPage()">
            <div class="touch-hint left-4">‹</div>
        </div>
        <div class="touch-zone touch-zone-right" onclick="nextPage()">
            <div class="touch-hint right-4">›</div>
        </div>

        <!-- Mobile Bottom Navigation -->
        <nav id="mobileNavBar" class="lg:hidden fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md border-t border-gray-200 dark:border-gray-800 z-50 flex justify-around p-2 shadow-lg">
            <button onclick="toggleMobileTab('setting')" class="p-2 flex flex-col items-center text-gray-600 dark:text-gray-400 hover:text-indigo-600 transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <span class="text-[10px] font-medium uppercase tracking-wider">Setting</span>
            </button>
            <button onclick="toggleMobileTab('display')" class="p-2 flex flex-col items-center text-gray-600 dark:text-gray-400 hover:text-indigo-600 transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                <span class="text-[10px] font-medium uppercase tracking-wider">Display</span>
            </button>
            <button onclick="toggleMobileTab('move')" class="p-2 flex flex-col items-center text-gray-600 dark:text-gray-400 hover:text-indigo-600 transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
                <span class="text-[10px] font-medium uppercase tracking-wider">Move</span>
            </button>
        </nav>

        <!-- Mobile Tab Panels -->
        <div id="mobileTabsPanel" class="lg:hidden fixed bottom-[64px] left-0 right-0 bg-white/95 dark:bg-gray-800/95 backdrop-blur-xl border-t border-gray-200 dark:border-gray-700 z-40 p-6 transition-transform duration-300 translate-y-full shadow-2xl rounded-t-3xl">
            
            <!-- Setting Tab -->
            <div id="tab-setting" class="mobile-tab-content hidden flex-col gap-6">
                <div class="text-center">
                    <h3 class="font-bold text-gray-800 dark:text-gray-200 text-lg mb-1">HD Quality PDF</h3>
                    <p class="text-xs text-gray-500">Contrast, Brightness, Darkness &amp; Sharpness</p>
                </div>
                <div class="px-2">
                    <input type="range" id="enhanceSlider" min="0" max="100" value="50" oninput="applyPdfEnhancement(this.value)" class="w-full h-3 bg-gray-200 rounded-full appearance-none cursor-pointer dark:bg-gray-700 accent-indigo-600" />
                </div>
            </div>

            <!-- Display Tab -->
            <div id="tab-display" class="mobile-tab-content hidden flex-col gap-6">
                <div class="text-center">
                    <h3 class="font-bold text-gray-800 dark:text-gray-200 text-lg mb-1">Display</h3>
                    <p class="text-xs text-gray-500">Customize Reading Experience</p>
                </div>
                <div class="flex flex-col gap-4">
                    <div class="flex gap-4 justify-around">
                        <button onclick="togglePdfBackground()" class="py-3 px-4 bg-indigo-100 hover:bg-indigo-200 dark:bg-indigo-900/50 dark:hover:bg-indigo-800 text-indigo-700 dark:text-indigo-300 rounded-xl font-bold text-sm flex-1 transition-colors shadow-sm">
                            Toggle Background
                        </button>
                        <button onclick="toggleDarkMode()" class="py-3 px-4 bg-purple-100 hover:bg-purple-200 dark:bg-purple-900/50 dark:hover:bg-purple-800 text-purple-700 dark:text-purple-300 rounded-xl font-bold text-sm flex-1 transition-colors shadow-sm">
                            App Theme
                        </button>
                    </div>
                    <div class="flex gap-4 justify-around">
                        <button onclick="toggleViewMode()" class="py-3 px-4 bg-blue-100 hover:bg-blue-200 dark:bg-blue-900/50 dark:hover:bg-blue-800 text-blue-700 dark:text-blue-300 rounded-xl font-bold text-sm flex-1 transition-colors shadow-sm flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                            </svg>
                            Two-Page
                        </button>
                        <button onclick="toggleFullScreen()" class="py-3 px-4 bg-emerald-100 hover:bg-emerald-200 dark:bg-emerald-900/50 dark:hover:bg-emerald-800 text-emerald-700 dark:text-emerald-300 rounded-xl font-bold text-sm flex-1 transition-colors shadow-sm flex items-center justify-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/>
                            </svg>
                            Full Screen
                        </button>
                    </div>
                </div>
            </div>

            <!-- Move Tab -->
            <div id="tab-move" class="mobile-tab-content hidden flex-col gap-6">
                <div class="text-center">
                    <h3 class="font-bold text-gray-800 dark:text-gray-200 text-lg mb-1">Move &amp; Zoom</h3>
                </div>
                <div class="flex flex-col gap-5 px-2">
                    <div>
                        <label class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-2 block">Zoom Level</label>
                        <input type="range" min="50" max="250" value="100" oninput="applyMobileZoom(this.value)" class="w-full h-3 bg-gray-200 rounded-full appearance-none cursor-pointer dark:bg-gray-700 accent-blue-500" />
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-2 block">Up &amp; Down</label>
                        <input type="range" min="0" max="100" value="0" oninput="applyMobileScrollY(this.value)" class="w-full h-3 bg-gray-200 rounded-full appearance-none cursor-pointer dark:bg-gray-700 accent-green-500" />
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-600 dark:text-gray-400 uppercase tracking-wider mb-2 block">Right &amp; Left</label>
                        <input type="range" min="0" max="100" value="0" oninput="applyMobileScrollX(this.value)" class="w-full h-3 bg-gray-200 rounded-full appearance-none cursor-pointer dark:bg-gray-700 accent-orange-500" />
                    </div>
                </div>
            </div>
        </div>

    </div>

    

<script src="script.js"></script></body></html>
